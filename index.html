        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;

        nav {
            background-color: #333;
            padding: 10px;
        }

        nav a {
            color: white;

            margin: 15px;
        }

        section {
            padding: 20px;
        }

        form {
            max-width: 400px;
            margin: auto;
        }

        input, textarea {

<body>

<h1 id="welcomeMessage">Welcome!</h1>

<nav>
    <a href="#about">About</a>

</nav>

<section id="about">
    <h2>About</h2>

    <form>
        <input type="text" placeholder="Name">
